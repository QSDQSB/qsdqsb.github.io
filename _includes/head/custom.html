{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" type="image/x-icon" href="{{ base_path }}/images/favicon/32x32.ico" sizes="32x32">
<link rel="icon" type="image/x-icon" href="{{ base_path }}/images/favicon/64x64.ico" sizes="64x64">
<link rel="icon" type="image/x-icon" href="{{ base_path }}/images/favicon/128x128.ico" sizes="128x128">
<link rel="icon" type="image/x-icon" href="{{ base_path }}/images/favicon/192x192.ico" sizes="192x192">
<link rel="icon" type="image/x-icon" href="{{ base_path }}/images/favicon/256x256.ico" sizes="256x256">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<link rel="shortcut icon" href="/favicon.ico">
<meta name="msapplication-TileColor" content="#000000">
<meta name="msapplication-config" content="{{ base_path }}/images/browserconfig.xml?v=M44lzPylqQ">
<meta name="theme-color" content="#f0f0f0">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Preload key local fonts to reduce layout shift -->
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Regular.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Italic.ttf" as="font" type="font/ttf" crossorigin>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.cdnfonts.com/css/cmu-serif" rel="stylesheet">

<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>

<!-- Leaflet Map Library (CSS & JS) - Load BEFORE map.js, NO integrity checks -->

     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
crossorigin=""></script>

<!-- Map Renderer Script - Loads AFTER Leaflet -->
<script src="{{ base_path }}/assets/js/map.js"></script>

<!-- end custom head snippets -->

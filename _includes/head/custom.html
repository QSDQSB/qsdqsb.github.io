{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<meta name="theme-color" content="#f0f0f0">
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Preload key local fonts to reduce layout shift.
     Note: no `crossorigin` — fonts are same-origin; Jekyll dev server does not
     send CORS headers, so adding `crossorigin` makes Safari reject the preload. -->
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Regular.ttf" as="font" type="font/ttf">
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Italic.ttf" as="font" type="font/ttf">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300&display=swap" rel="stylesheet" type="text/css">
<link href="https://fonts.cdnfonts.com/css/cmu-serif" rel="stylesheet">

<!-- MathJax — only on pages that opt in via `has_math: true` frontmatter -->
{% if page.has_math %}
<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>
{% endif %}

<!-- Leaflet + map renderer — only on pages that show a map.
     Gate matches _layouts/gallery.html: a map appears whenever the page
     declares `map_dataset` (legacy YAML path) OR `subgalleries: true`
     (new path — the layout auto-derives `voyage-<slug>` from children).
     Skipping these on the other ~96% of pages saves ~180 KB of render-blocking JS+CSS. -->
{% if page.map_dataset or page.subgalleries %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin="" defer></script>
<script src="{{ base_path }}/assets/js/map.js" defer></script>
{% endif %}

<!-- end custom head snippets -->

{% include base_path %}

<!-- start custom head snippets -->

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="mask-icon" href="{{ base_path }}/images/safari-pinned-tab.svg" color="#000000">
<meta name="theme-color" content="#f0f0f0">
<!-- Self-hosted Font Awesome 6 Free (woff2). Replaces the remote kit + legacy
     local FA5 vendor import — one FA6 source, no third-party async dependency. -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.min.css"/>

<!-- Preload key local fonts to reduce layout shift.
     Preload the WOFF2 the browser will actually use (matches the woff2-first
     src in _custom.scss) — preloading the TTF would download a format the
     @font-face never resolves to.
     Note: no `crossorigin` — fonts are same-origin; Jekyll dev server does not
     send CORS headers, so adding `crossorigin` makes Safari reject the preload. -->
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Regular.woff2" as="font" type="font/woff2">
<link rel="preload" href="{{ base_path }}/assets/fonts/Barlow/Barlow-Italic.woff2" as="font" type="font/woff2">
<!-- Playfair Display is the site's body + heading face ($global-font-family /
     $header-font-family) — preload the latin regular so first-paint text does
     not wait on the CSS-discovered @font-face. -->
<link rel="preload" href="{{ base_path }}/assets/fonts/PlayfairDisplay/PlayfairDisplay-400-normal-latin.woff2" as="font" type="font/woff2">


<!-- Playfair Display + Philosopher are self-hosted (see _sass/_custom.scss) —
     no fonts.googleapis.com request or preconnect needed. CMU Serif still comes
     from cdnfonts (not on Google Fonts; kept as-is for now). -->
<link href="https://fonts.cdnfonts.com/css/cmu-serif" rel="stylesheet">

<!-- MathJax — only on pages that opt in via `has_math: true` frontmatter -->
{% if page.has_math %}
<script type="text/x-mathjax-config"> MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "all" } } }); </script>
<script type="text/x-mathjax-config">
  MathJax.Hub.Config({
    tex2jax: {
      inlineMath: [ ['$','$'], ["\\(","\\)"] ],
      displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
      processEscapes: true
    }
  });
</script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/latest.js?config=TeX-MML-AM_CHTML' async></script>
{% endif %}

<!-- Leaflet + map renderer — only on pages that show a map.
     Gate matches _layouts/gallery.html: a map appears whenever the page
     declares `map_dataset` (legacy YAML path) OR `subgalleries: true`
     (new path — the layout auto-derives `voyage-<slug>` from children).
     Skipping these on the other ~96% of pages saves ~180 KB of render-blocking JS+CSS. -->
{% if page.map_dataset or page.subgalleries %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin="" defer></script>
<script src="{{ base_path }}/assets/js/map.js" defer></script>
{% endif %}

<!-- end custom head snippets -->

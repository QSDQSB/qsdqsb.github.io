# =============================================================================
# Deploy Jekyll site to GitHub Pages
# =============================================================================
#
# This workflow IS the canonical deploy mechanism. It only fires when
# Settings → Pages → Build and deployment → Source = "GitHub Actions".
# (If Source is set to "Deploy from a branch", legacy Pages auto-build runs
# instead and this workflow's `actions/deploy-pages@v4` step would fail.)
#
# Pipeline:
#   1. Checkout repo (gallery sources at gallery/** are committed; thumbnails
#      and meta YAML are NOT — they're generated fresh on every run).
#   2. Verify both dependency lock files (package-lock.json + Gemfile.lock)
#      are committed; fail fast with a clear error if either is missing.
#   3. Install Ruby 3.2 + Bundler-managed gems (Jekyll + github-pages stack).
#   4. Install Node 20 + npm packages (Sharp for thumbnail generation).
#   5. Generate thumbnails: 1×/2× JPEG + WebP + LQIP data-URIs +
#      per-image dimensions (writes _data/gallery_meta/*.yml).
#      AVIF is intentionally NOT generated — see scripts/generate-gallery-assets.mjs
#      header for rationale (savings vs. CI cost don't justify it on
#      480w/960w thumbnails).
#   6. Geocode map data → assets/maps/*.geojson.
#   7. Build Jekyll site (production env, UTF-8 I/O).
#   8. Sanity-check the generated _site (assert thumbnail count is plausible).
#   9. Upload Pages artifact + deploy.

name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping in-flight runs in favour of
# the latest. `cancel-in-progress: false` lets an active deploy finish before
# starting the next so we don't leave Pages in a half-deployed state.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 25     # safety net — a healthy run is ~3-5 minutes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so jekyll-last-modified-at reads real per-file git
          # dates (sitemap <lastmod>, article:modified_time). A shallow
          # clone would stamp every file with the latest commit's date.
          fetch-depth: 0

      - name: Verify dependency lock files
        # actions/setup-node and ruby/setup-ruby both rely on lock files for
        # caching. If either is missing, the next steps fail with a confusing
        # error message — we want a clear one upfront.
        run: |
          missing=0
          if [ ! -f package-lock.json ]; then
            echo "::error file=package.json,title=Missing lock file::package-lock.json missing — run 'npm install' locally and commit the lock file."
            missing=1
          fi
          if [ ! -f Gemfile.lock ]; then
            echo "::error file=Gemfile,title=Missing lock file::Gemfile.lock missing — run 'bundle install' locally and commit the lock file."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "✓ package-lock.json and Gemfile.lock present"

      - name: Setup Ruby + Bundler cache
        # bundler-cache: true installs gems from Gemfile.lock and caches them
        # keyed on the lock file's hash. github-pages gem (in Gemfile) pins
        # Jekyll + plugins to versions whitelisted by GitHub Pages.
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Setup Node + npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        # Sharp ships prebuilt binaries for ubuntu-latest x64 + Node 20, so
        # `npm ci` is sufficient — no need for `apt-get install libvips`.
        run: npm ci --no-audit --no-fund

      - name: Generate gallery assets (1×/2× JPEG/WebP + LQIP)
        # Reads gallery/** (committed source images), writes:
        #   - images/thumbnails/gallery/**/*.{jpg,webp}  + 2× variants
        #   - _data/gallery_meta/*.yml  (lqip + width + height + format flags)
        # Per-image flags drive Liquid in _layouts/gallery.html to emit only
        # the <source> tags + srcset entries for formats that actually exist,
        # so the rendered HTML matches what's on disk. ~7-8 minutes for ~600
        # images on a fresh runner.
        run: npm run generate:gallery

      - name: Geocode maps to GeoJSON
        run: npm run geocode

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
          # Forces Ruby's I/O encoding to UTF-8 so Liquid + compress.html
          # don't choke on the © glyph in _layouts/gallery.html (and the
          # other UTF-8 chars in voyage subtitles).
          RUBYOPT: "-E utf-8:utf-8"
        run: bundle exec jekyll build

      - name: Verify build output
        # Sanity gate: if generate:gallery silently failed, _site would have
        # very few thumbnail files. Fail loud rather than deploy a broken
        # site. Threshold is intentionally conservative.
        run: |
          THUMB_COUNT=$(find _site/images/thumbnails/gallery -type f 2>/dev/null | wc -l)
          PAGE_COUNT=$(find _site -name "index.html" 2>/dev/null | wc -l)
          echo "Built _site: $PAGE_COUNT pages, $THUMB_COUNT thumbnail files"
          if [ "$THUMB_COUNT" -lt 100 ]; then
            echo "::error::Thumbnail count ($THUMB_COUNT) is suspiciously low — gallery generation likely failed silently."
            exit 1
          fi

      - name: Verify sitemap
        # The sitemap must stay well-formed XML with only canonical
        # https://qsdqsb.github.io URLs — Search Console gives no useful
        # diagnostics when a sitemap is subtly broken, so we prove the
        # artifact healthy on every deploy instead.
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          ns = '{http://www.sitemaps.org/schemas/sitemap/0.9}'
          img = '{http://www.google.com/schemas/sitemap-image/1.1}'
          root = ET.parse('_site/sitemap.xml').getroot()
          locs = [e.text for e in root.iter(ns + 'loc')]
          imgs = [e.text for e in root.iter(img + 'loc')]
          bad = [u for u in locs + imgs if not (u or '').startswith('https://qsdqsb.github.io')]
          assert len(locs) > 50, f'sitemap has only {len(locs)} URLs - generation likely broken'
          assert len(imgs) > 50, f'sitemap has only {len(imgs)} gallery images - image entries likely broken'
          assert not bad, f'non-canonical sitemap URLs: {bad[:5]}'
          print(f'sitemap OK: {len(locs)} page URLs, {len(imgs)} gallery images')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Submit sitemap URLs to IndexNow
        # Google does not support IndexNow — this feeds Bing/Yandex, whose
        # indexes power ChatGPT Search and Copilot. The key is public by
        # protocol design (it is served at /<key>.txt), so committing it is
        # fine. Never allowed to fail the deploy.
        continue-on-error: true
        run: |
          sleep 30
          curl -sS --max-time 30 https://qsdqsb.github.io/sitemap.xml -o /tmp/sitemap.xml
          python3 - <<'PY'
          import json, urllib.request, xml.etree.ElementTree as ET
          ns = '{http://www.sitemaps.org/schemas/sitemap/0.9}'
          locs = [e.text for e in ET.parse('/tmp/sitemap.xml').getroot().iter(ns + 'loc')]
          key = '3fb10d5bff3eb87abe2dad2186078f68'
          payload = {
              'host': 'qsdqsb.github.io',
              'key': key,
              'keyLocation': f'https://qsdqsb.github.io/{key}.txt',
              'urlList': locs,
          }
          req = urllib.request.Request(
              'https://api.indexnow.org/indexnow',
              data=json.dumps(payload).encode(),
              headers={'Content-Type': 'application/json; charset=utf-8'},
          )
          with urllib.request.urlopen(req, timeout=30) as r:
              print(f'IndexNow accepted {len(locs)} URLs (HTTP {r.status})')
          PY
